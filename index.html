<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#1a2744" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Lubrificação de Frota — Santa Vergínia</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/logo-sv.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="logo">
        <img src="icons/logo-sv.png" alt="Santa Vergínia" />
      </div>
      <div>
        <h1>Lubrificação de Frota</h1>
        <p>Agropecuária e Florestal</p>
      </div>
    </header>

    <div class="offline-banner hidden" id="offlineBanner">
      Sem internet no momento. Você pode lançar; enviamos quando a conexão voltar.
    </div>

    <form id="formLub" autocomplete="off">
      <div class="sec">Operação</div>
      <div class="op-btns">
        <button type="button" class="op-btn active" data-op="preventiva">Preventiva</button>
        <button type="button" class="op-btn" data-op="corretiva">Corretiva</button>
      </div>

      <div class="sec">Identificação</div>
      <div class="field">
        <label for="dataServico">Data</label>
        <input type="date" id="dataServico" required />
      </div>
      <div class="field autocomplete-wrap">
        <label for="frota">Frota / Equipamento</label>
        <input type="text" id="frota" placeholder="Número da frota" required />
        <div class="autocomplete-list" id="frotaList"></div>
      </div>
      <div class="field autocomplete-wrap">
        <label for="operador">Operador</label>
        <input type="text" id="operador" placeholder="Nome do operador" required />
        <div class="autocomplete-list" id="operadorList"></div>
      </div>

      <div class="sec">Horímetro</div>
      <div class="row-2" id="horimetroRow">
        <div class="field">
          <label for="hAtual" id="hAtualLabel">Horímetro na troca (h)</label>
          <input type="number" id="hAtual" inputmode="decimal" step="1" min="0" placeholder="0" required />
        </div>
        <div class="field" id="hProxWrap">
          <label for="hProx">Próxima troca (h)</label>
          <input type="number" id="hProx" inputmode="decimal" step="1" min="0" placeholder="Auto +300h" readonly tabindex="-1" />
          <small class="field-hint" id="hProxHint">Calculada automaticamente (+300h)</small>
        </div>
      </div>

      <div class="sec">Óleo / Lubrificante</div>
      <div id="oleoContainer"></div>
      <button type="button" class="btn-add" id="btnAddOleo">+ Adicionar óleo</button>

      <div class="sec">Filtro</div>
      <div id="filtroContainer"></div>
      <button type="button" class="btn-add" id="btnAddFiltro">+ Adicionar filtro</button>

      <div class="field">
        <label for="obs">Observação</label>
        <textarea id="obs" rows="2" placeholder="Se necessário, descreva o serviço"></textarea>
      </div>

      <button type="submit" class="btn-save" id="btnSave">Registrar serviço</button>
    </form>

    <section class="recent">
      <div class="sec">Últimos serviços</div>
      <div id="recentList"></div>
    </section>
  </div>

  <div class="toast" id="toast"></div>

  <script src="config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    }
  </script>
</body>
</html>
